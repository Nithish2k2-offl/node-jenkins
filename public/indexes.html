<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Container To-Do</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1e293b;
            color: #f8fafc;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }

        .box {
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #1e293b;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #38bdf8;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2> Container To-Do List</h2>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button onclick="createTask()">Create</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // Fetch and print existing tasks
        async function fetchTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            taskList.innerHTML = tasks.map(task => `<li>${task}</li>`).join('');
        }

        // Add a task and refresh the list automatically
        async function createTask() {
            const taskText = taskInput.value.trim();
            if (!taskText) return;

            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task: taskText })
            });

            taskInput.value = '';
            fetchTasks();
        }

        // Run immediately when page loads
        fetchTasks();
    </script>
</body>

</html>
